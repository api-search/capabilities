name: APIs.io Capabilities
description: Browse API capabilities and workflows across the APIs.io network.
image: https://apis.io/assets/branding/apisio-social-card.png
url: https://capabilities.apis.io

node: website
nav_active: capabilities

keywords:
  - APIs
  - Search
  - Discovery

exclude: [".rvmrc", ".rbenv-version", "README.md", "Rakefile", "changelog.md", "scripts"]
include: [".well-known"]

github_org: api-search
github_repo: capabilities

collections:
  capabilities:
    output: true
    permalink: /capabilities/:path/
  categories:
    output: true
    permalink: /categories/:path/

defaults:
  - scope:
      path: ""
      type: capabilities
    values:
      layout: capability
  - scope:
      path: ""
      type: categories
    values:
      layout: category
